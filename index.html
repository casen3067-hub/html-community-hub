<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault - Play HTML Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --accent: #ec4899;
      --bg: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5em;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-count {
      background: var(--bg-card);
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.9em;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      gap: 10px;
    }

    .search-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 25px;
      color: var(--text-primary);
      width: 300px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .search-bar:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .upload-toggle {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
    }

    .upload-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    /* UPLOAD MODAL */
    .upload-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .upload-modal.show {
      display: flex;
    }

    .upload-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .upload-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .upload-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8em;
      font-weight: 700;
    }

    .close-modal {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      background: #ef4444;
      color: white;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .icon-preview {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .icon-display {
      width: 80px;
      height: 80px;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      overflow: hidden;
    }

    .icon-display img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button[type="submit"] {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
    }

    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #10b981;
      color: #86efac;
    }

    /* GAMES SECTION */
    .games-header {
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .games-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5em;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .games-subtitle {
      color: var(--text-secondary);
      font-size: 1em;
    }

    /* GAME GRID */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .game-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.25);
    }

    .game-thumbnail {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5em;
      overflow: hidden;
      position: relative;
    }

    .game-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .game-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .game-meta {
      color: var(--text-secondary);
      font-size: 0.8em;
      margin-bottom: 12px;
      flex: 1;
    }

    .game-actions {
      display: flex;
      gap: 8px;
    }

    .game-btn {
      flex: 1;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85em;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    .game-btn:hover {
      background: var(--primary);
      color: white;
    }

    .game-btn a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      animation: fadeIn 0.6s ease-out;
    }

    .empty-state-icon {
      font-size: 5em;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    /* GAME PLAYER MODAL */
    .game-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease;
    }

    .game-modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-card);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 1000px;
      height: 90vh;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-family: 'Outfit', sans-serif;
      color: var(--primary);
      margin: 0;
      font-size: 1.5em;
    }

    .close-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 10px;
      width: 45px;
      height: 45px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #ef4444;
      color: white;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        padding: 20px 15px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        flex-direction: column;
      }

      .search-bar {
        width: 100%;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
      }

      .game-thumbnail {
        height: 150px;
        font-size: 2.5em;
      }

      .modal-content {
        width: 95%;
        height: 95vh;
        padding: 20px;
      }

      .logo {
        font-size: 1.8em;
      }

      .games-header h2 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo">🎮</div>
        <div class="game-count">Loaded <span id="gameCount">0</span> games...</div>
      </div>
      <div class="header-right">
        <input 
          type="text" 
          class="search-bar" 
          id="searchInput" 
          placeholder="find what you want..."
        >
        <button class="upload-toggle" onclick="openUploadModal()">+</button>
      </div>
    </header>

    <div class="games-header">
      <h2>games</h2>
      <p class="games-subtitle">Share and play HTML games with the community</p>
    </div>

    <div class="games-grid" id="gamesGrid">
      <div class="empty-state">
        <div class="empty-state-icon">🎮</div>
        <p>No games uploaded yet. Be the first to share!</p>
      </div>
    </div>
  </div>

  <!-- UPLOAD MODAL -->
  <div class="upload-modal" id="uploadModal">
    <div class="upload-content">
      <div class="upload-header">
        <h2>Create & Upload</h2>
        <button class="close-modal" onclick="closeUploadModal()">&times;</button>
      </div>
      <form id="uploadForm">
        <input 
          type="text" 
          id="name" 
          placeholder="Game Name" 
          required
        >
        <input 
          type="text" 
          id="uploader" 
          placeholder="Your Name (optional)"
        >
        <textarea 
          id="description" 
          placeholder="Describe your game..."
        ></textarea>

        <div class="icon-preview">
          <div class="icon-display" id="iconDisplay">🎮</div>
          <div style="flex: 1;">
            <p style="color: var(--text-secondary); font-size: 0.85em; margin-bottom: 10px;">Game Icon (optional)</p>
            <input 
              type="file" 
              id="icon" 
              accept=".jpg,.jpeg,.png"
            >
          </div>
        </div>

        <input 
          type="file" 
          id="file" 
          accept=".html" 
          required
        >

        <div id="message" class="message"></div>
        <button type="submit">🚀 Upload Game</button>
      </form>
    </div>
  </div>

  <!-- GAME PLAYER MODAL -->
  <div class="game-modal" id="gameModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="gameTitle">Playing Game</h2>
        <button class="close-btn" onclick="closeGame()">&times;</button>
      </div>
      <div class="modal-body">
        <iframe id="gameFrame" src="" title="Game Player"></iframe>
      </div>
    </div>
  </div>

  <script>
    let iconData = null;
    let allGames = [];

    // Load games when page opens
    loadGames();

    // Handle form submission
    document.getElementById('uploadForm').addEventListener('submit', uploadFile);

    // Handle search
    document.getElementById('searchInput').addEventListener('input', function(e) {
      filterGames(e.target.value);
    });

    // Handle icon preview
    document.getElementById('icon').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          iconData = event.target.result;
          const display = document.getElementById('iconDisplay');
          display.innerHTML = `<img src="${iconData}" alt="Icon preview">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // Close modals when clicking outside
    document.getElementById('uploadModal').addEventListener('click', function(e) {
      if (e.target === this) closeUploadModal();
    });

    document.getElementById('gameModal').addEventListener('click', function(e) {
      if (e.target === this) closeGame();
    });

    async function loadGames() {
      try {
        const response = await fetch('/api/files');
        allGames = await response.json();
        document.getElementById('gameCount').textContent = allGames.length;
        renderGames(allGames);
      } catch (err) {
        console.error('Error loading games:', err);
      }
    }

    function renderGames(games) {
      const grid = document.getElementById('gamesGrid');
      
      if (games.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🎮</div>
            <p>No games found. Be the first to share!</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = games.map(game => `
        <div class="game-card">
          <div class="game-thumbnail">
            ${game.icon ? `<img src="data:image/jpeg;base64,${game.icon}" alt="${game.name}">` : '🎮'}
          </div>
          <div class="game-info">
            <div class="game-title">${game.name}</div>
            <div class="game-meta">${game.uploader || 'Anonymous'}</div>
            <div class="game-actions">
              <button class="game-btn" onclick="playGame(${game.id}, '${game.name}')">🎮 Play</button>
              <button class="game-btn"><a href="/api/download/${game.id}">📥</a></button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterGames(query) {
      const filtered = allGames.filter(game =>
        game.name.toLowerCase().includes(query.toLowerCase()) ||
        game.uploader.toLowerCase().includes(query.toLowerCase())
      );
      renderGames(filtered);
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('show');
    }

    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('show');
    }

    function playGame(fileId, fileName) {
      const modal = document.getElementById('gameModal');
      const gameFrame = document.getElementById('gameFrame');
      const gameTitle = document.getElementById('gameTitle');
      
      gameTitle.textContent = `🎮 ${fileName}`;
      gameFrame.src = `/api/view/${fileId}`;
      
      modal.classList.add('show');
    }

    function closeGame() {
      const modal = document.getElementById('gameModal');
      const gameFrame = document.getElementById('gameFrame');
      
      modal.classList.remove('show');
      gameFrame.src = '';
    }

    async function uploadFile(e) {
      e.preventDefault();

      const htmlFile = document.getElementById('file').files[0];
      const gameName = document.getElementById('name').value;
      const submitBtn = document.querySelector('button[type="submit"]');
      
      if (!htmlFile || !gameName) {
        showMessage('❌ Please fill in all required fields!', 'error');
        return;
      }

      // Show loading state
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Uploading...';
      showMessage('⏳ Uploading your game...', 'success');

      const formData = new FormData();
      formData.append('name', gameName);
      formData.append('description', document.getElementById('description').value);
      formData.append('uploader', document.getElementById('uploader').value);
      formData.append('file', htmlFile);
      
      if (iconData) {
        formData.append('iconData', iconData);
      }

      try {
        console.log('Uploading:', gameName);
        
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        console.log('Upload response:', result);

        if (response.ok) {
          submitBtn.textContent = '✅ Uploaded!';
          showMessage('✅ Game uploaded successfully!', 'success');
          document.getElementById('uploadForm').reset();
          document.getElementById('iconDisplay').innerHTML = '🎮';
          iconData = null;
          
          setTimeout(() => {
            closeUploadModal();
            loadGames();
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }, 2000);
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          showMessage('❌ ' + (result.error || 'Upload failed. Try again!'), 'error');
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        console.error('Upload error:', err);
        showMessage('❌ Upload error: ' + err.message, 'error');
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.className = `message show ${type}`;
      messageDiv.textContent = text;
      
      if (type === 'success') {
        setTimeout(() => {
          messageDiv.className = 'message';
        }, 3000);
      }
    }
  </script>
</body>
</html>
