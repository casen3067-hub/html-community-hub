<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault - Play HTML Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --accent: #ec4899;
      --bg: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a1f35 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* ATTRIBUTION */
    .attribution {
      text-align: center;
      padding: 12px 20px;
      background: rgba(99, 102, 241, 0.1);
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85em;
      animation: fadeInDown 0.6s ease-out;
    }

    .attribution strong {
      color: var(--primary);
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5em;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-count {
      background: var(--bg-card);
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.9em;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      gap: 10px;
    }

    .search-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 25px;
      color: var(--text-primary);
      width: 300px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .search-bar:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .header-buttons {
      display: flex;
      gap: 10px;
    }

    .upload-toggle, .settings-toggle {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
    }

    .upload-toggle:hover, .settings-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.05s both;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .category-btn {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .category-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .category-btn.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border-color: transparent;
    }

    /* LOADING SCREEN */
    .loading-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 39, 0.95);
      backdrop-filter: blur(5px);
      z-index: 2500;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .loading-screen.show {
      display: flex;
    }

    .loading-content {
      text-align: center;
      color: white;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(99, 102, 241, 0.2);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 1.2em;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* MODALS */
    .upload-modal, .settings-modal, .game-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .upload-modal.show, .settings-modal.show, .game-modal.show {
      display: flex;
    }

    .modal-content, .upload-content, .settings-content {
      background: var(--bg-card);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .upload-content, .settings-content {
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-family: 'Outfit', sans-serif;
      color: var(--primary);
      margin: 0;
      font-size: 1.5em;
    }

    .close-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 10px;
      width: 45px;
      height: 45px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #ef4444;
      color: white;
    }

    /* GAME MODAL */
    .game-modal .modal-content {
      width: 95%;
      height: 95vh;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .game-modal .modal-header {
      padding: 20px 30px;
      margin: 0;
      border-bottom: 1px solid var(--border);
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* FULLSCREEN STATE */
    .game-modal.fullscreen {
      background: #000;
    }

    .game-modal.fullscreen .modal-content {
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
    }

    .game-modal.fullscreen .modal-header {
      background: rgba(10, 14, 39, 0.95);
      padding: 15px 20px;
    }

    .fullscreen-btn {
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 10px;
      width: 45px;
      height: 45px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      padding: 0;
    }

    .fullscreen-btn:hover {
      background: var(--primary);
      color: white;
    }

    /* UPLOAD & SETTINGS FORMS */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea, select {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button[type="submit"] {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
    }

    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #10b981;
      color: #86efac;
    }

    /* GAMES GRID */
    .games-header {
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .games-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5em;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .game-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.25);
    }

    .game-thumbnail {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5em;
      overflow: hidden;
    }

    .game-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .game-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .game-meta {
      color: var(--text-secondary);
      font-size: 0.8em;
      margin-bottom: 12px;
      flex: 1;
    }

    .game-actions {
      display: flex;
      gap: 8px;
    }

    .game-btn {
      flex: 1;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85em;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    .game-btn:hover {
      background: var(--primary);
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      animation: fadeIn 0.6s ease-out;
    }

    .empty-state-icon {
      font-size: 5em;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 1.2em;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        padding: 20px 15px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        flex-direction: column;
      }

      .search-bar {
        width: 100%;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }

      .logo {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="attribution">
    website made with <strong>java</strong>, by <strong>Casen</strong>
  </div>

  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo">🎮</div>
        <div class="game-count">Loaded <span id="gameCount">0</span> games...</div>
      </div>
      <div class="header-right">
        <input 
          type="text" 
          class="search-bar" 
          id="searchInput" 
          placeholder="find what you want..."
        >
        <div class="header-buttons">
          <button class="upload-toggle" onclick="openUploadModal()">+</button>
          <button class="settings-toggle" onclick="openSettingsModal()">⚙️</button>
        </div>
      </div>
    </header>

    <!-- CATEGORIES -->
    <div class="categories" id="categoriesContainer">
      <button class="category-btn active" onclick="filterCategory('all')">All Games</button>
    </div>

    <div class="games-header">
      <h2>games</h2>
    </div>

    <div class="games-grid" id="gamesGrid">
      <div class="empty-state">
        <div class="empty-state-icon">🎮</div>
        <p>No games uploaded yet. Be the first to share!</p>
      </div>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Loading...</div>
    </div>
  </div>

  <!-- UPLOAD MODAL -->
  <div class="upload-modal" id="uploadModal">
    <div class="upload-content">
      <div class="modal-header">
        <h2>Create & Upload</h2>
        <button class="close-btn" onclick="closeUploadModal()">&times;</button>
      </div>
      <form id="uploadForm">
        <input 
          type="text" 
          id="name" 
          placeholder="Game Name" 
          required
        >
        <input 
          type="text" 
          id="uploader" 
          placeholder="Your Name (optional)"
        >
        <textarea 
          id="description" 
          placeholder="Describe your game..."
        ></textarea>

        <select id="category" required>
          <option value="">Select Category</option>
          <option value="action">Action</option>
          <option value="puzzle">Puzzle</option>
          <option value="adventure">Adventure</option>
          <option value="strategy">Strategy</option>
          <option value="sports">Sports</option>
          <option value="casual">Casual</option>
          <option value="other">Other</option>
        </select>

        <input 
          type="file" 
          id="icon" 
          accept=".jpg,.jpeg,.png"
        >

        <input 
          type="file" 
          id="file" 
          accept=".html" 
          required
        >

        <div id="message" class="message"></div>
        <button type="submit">🚀 Upload Game</button>
      </form>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn" onclick="closeSettingsModal()">&times;</button>
      </div>
      <form id="settingsForm">
        <label style="color: var(--text-secondary); font-size: 0.9em;">Loading Screen Text</label>
        <input 
          type="text" 
          id="loadingTextInput" 
          placeholder="Enter loading text..."
          value="Loading..."
        >
        <button type="submit">💾 Save Settings</button>
      </form>
    </div>
  </div>

  <!-- GAME MODAL -->
  <div class="game-modal" id="gameModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="gameTitle">Playing Game</h2>
        <div style="display: flex; gap: 10px;">
          <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
          <button class="close-btn" onclick="closeGame()">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <iframe id="gameFrame" src="" title="Game Player"></iframe>
      </div>
    </div>
  </div>

  <script>
    let iconData = null;
    let allGames = [];
    let currentCategory = 'all';
    let loadingText = 'Loading...';

    // Load games and settings on startup
    loadGames();
    loadSettings();

    // Event listeners
    document.getElementById('uploadForm').addEventListener('submit', uploadFile);
    document.getElementById('settingsForm').addEventListener('submit', saveSettings);
    document.getElementById('searchInput').addEventListener('input', function(e) {
      filterGames(e.target.value);
    });

    document.getElementById('icon').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          iconData = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Close modals when clicking outside
    document.getElementById('uploadModal').addEventListener('click', function(e) {
      if (e.target === this) closeUploadModal();
    });
    document.getElementById('settingsModal').addEventListener('click', function(e) {
      if (e.target === this) closeSettingsModal();
    });
    document.getElementById('gameModal').addEventListener('click', function(e) {
      if (e.target === this) closeGame();
    });

    // ESC key handling
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        const gameModal = document.getElementById('gameModal');
        if (gameModal.classList.contains('fullscreen')) {
          toggleFullscreen();
        }
      }
    });

    async function loadGames() {
      try {
        const response = await fetch('/api/files');
        allGames = await response.json();
        document.getElementById('gameCount').textContent = allGames.length;
        buildCategories();
        renderGames(allGames);
      } catch (err) {
        console.error('Error loading games:', err);
      }
    }

    function buildCategories() {
      const categories = new Set(['all']);
      allGames.forEach(game => {
        if (game.category) categories.add(game.category);
      });

      const container = document.getElementById('categoriesContainer');
      container.innerHTML = Array.from(categories).map(cat => `
        <button class="category-btn ${cat === 'all' ? 'active' : ''}" onclick="filterCategory('${cat}')">
          ${cat.charAt(0).toUpperCase() + cat.slice(1)}
        </button>
      `).join('');
    }

    function filterCategory(cat) {
      currentCategory = cat;
      showLoadingScreen();
      
      setTimeout(() => {
        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        event.target.classList.add('active');

        const filtered = cat === 'all' ? allGames : allGames.filter(g => g.category === cat);
        renderGames(filtered);
        hideLoadingScreen();
      }, 500);
    }

    function renderGames(games) {
      const grid = document.getElementById('gamesGrid');
      
      if (games.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🎮</div>
            <p>No games found</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = games.map(game => `
        <div class="game-card">
          <div class="game-thumbnail">
            ${game.icon ? `<img src="data:image/jpeg;base64,${game.icon}" alt="${game.name}">` : '🎮'}
          </div>
          <div class="game-info">
            <div class="game-title">${game.name}</div>
            <div class="game-meta">${game.uploader || 'Anonymous'}</div>
            <div class="game-actions">
              <button class="game-btn" onclick="playGame(${game.id}, '${game.name}')">🎮 Play</button>
              <button class="game-btn" onclick="downloadGame(${game.id})">📥</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterGames(query) {
      const filtered = allGames.filter(game =>
        game.name.toLowerCase().includes(query.toLowerCase()) ||
        game.uploader.toLowerCase().includes(query.toLowerCase())
      );
      renderGames(filtered);
    }

    function playGame(fileId, fileName) {
      showLoadingScreen();
      
      setTimeout(() => {
        const modal = document.getElementById('gameModal');
        const gameFrame = document.getElementById('gameFrame');
        const gameTitle = document.getElementById('gameTitle');
        
        gameTitle.textContent = `🎮 ${fileName}`;
        gameFrame.src = `/api/view/${fileId}`;
        
        modal.classList.add('show');
        hideLoadingScreen();
      }, 500);
    }

    function downloadGame(fileId) {
      window.location.href = `/api/download/${fileId}`;
    }

    function closeGame() {
      const modal = document.getElementById('gameModal');
      const gameFrame = document.getElementById('gameFrame');
      
      modal.classList.remove('show');
      modal.classList.remove('fullscreen');
      gameFrame.src = '';
    }

    function toggleFullscreen() {
      const modal = document.getElementById('gameModal');
      
      if (modal.classList.contains('fullscreen')) {
        modal.classList.remove('fullscreen');
      } else {
        modal.classList.add('fullscreen');
      }
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('show');
    }

    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('show');
    }

    function openSettingsModal() {
      document.getElementById('settingsModal').classList.add('show');
    }

    function closeSettingsModal() {
      document.getElementById('settingsModal').classList.remove('show');
    }

    function showLoadingScreen() {
      const screen = document.getElementById('loadingScreen');
      document.getElementById('loadingText').textContent = loadingText;
      screen.classList.add('show');
    }

    function hideLoadingScreen() {
      document.getElementById('loadingScreen').classList.remove('show');
    }

    function loadSettings() {
      const saved = localStorage.getItem('gameVaultSettings');
      if (saved) {
        const settings = JSON.parse(saved);
        loadingText = settings.loadingText || 'Loading...';
        document.getElementById('loadingTextInput').value = loadingText;
      }
    }

    async function saveSettings(e) {
      e.preventDefault();
      
      loadingText = document.getElementById('loadingTextInput').value || 'Loading...';
      const settings = { loadingText };
      
      localStorage.setItem('gameVaultSettings', JSON.stringify(settings));
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message show success';
      messageDiv.textContent = '✅ Settings saved!';
      document.getElementById('settingsForm').prepend(messageDiv);
      
      setTimeout(() => {
        messageDiv.remove();
      }, 3000);
    }

    async function uploadFile(e) {
      e.preventDefault();

      const htmlFile = document.getElementById('file').files[0];
      const gameName = document.getElementById('name').value;
      const submitBtn = document.querySelector('button[type="submit"]');
      
      if (!htmlFile || !gameName) {
        showMessage('❌ Please fill in all required fields!', 'error');
        return;
      }

      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Uploading...';
      showMessage('⏳ Uploading your game...', 'success');

      const formData = new FormData();
      formData.append('name', gameName);
      formData.append('description', document.getElementById('description').value);
      formData.append('uploader', document.getElementById('uploader').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('file', htmlFile);
      
      if (iconData) {
        formData.append('iconData', iconData);
      }

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          submitBtn.textContent = '✅ Uploaded!';
          showMessage('✅ Game uploaded successfully!', 'success');
          document.getElementById('uploadForm').reset();
          iconData = null;
          
          setTimeout(() => {
            closeUploadModal();
            loadGames();
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          }, 2000);
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          showMessage('❌ ' + (result.error || 'Upload failed!'), 'error');
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        showMessage('❌ Error: ' + err.message, 'error');
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.className = `message show ${type}`;
      messageDiv.textContent = text;
      
      if (type === 'success') {
        setTimeout(() => {
          messageDiv.className = 'message';
        }, 3000);
      }
    }
  </script>
</body>
</html>
